<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSE Dashboard - TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800;900&display=swap');

        * { box-sizing: border-box; }

        body {
            background-color: #080c14;
            font-family: 'Barlow', sans-serif;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }
        #root { height: 100vh; display: flex; flex-direction: column; }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOnly {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes bounce-arrow {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50%       { transform: translateY(6px); opacity: 1; }
        }

        .screen-enter  { animation: fadeSlide 0.55s ease forwards; }
        .obra-enter    { animation: fadeOnly 0.7s ease forwards; }
        .bounce-arrow  { animation: bounce-arrow 1.4s ease-in-out infinite; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        .header-glow {
            background: linear-gradient(90deg, rgba(59,130,246,0.12), rgba(16,185,129,0.08), transparent);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 8px; }
    </style>
</head>
<body class="text-slate-200">
<div id="root"></div>

<script type="text/babel">
    const { useState, useMemo, useEffect, useCallback, useRef } = React;

    // ============================================================================
    // CONFIG
    // ============================================================================
    const WEB_APP_URL    = "https://script.google.com/macros/s/AKfycbxBi36PJqeLPhOS64aeCUCMkrGGo2wRCWvxYuH5LfYW2X9mdS9NCBjGmRYusHtsQ5o/exec";
    const SLIDE_DURATION = 15000;

    // ============================================================================
    // ÍCONES
    // ============================================================================
    const Icon = ({ d, size=24, className="", style={} }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
             fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
             className={className} style={style} dangerouslySetInnerHTML={{ __html: d }} />
    );
    const IconTrophy   = p => <Icon {...p} d='<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>' />;
    const IconTrend    = p => <Icon {...p} d='<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>' />;
    const IconTarget   = p => <Icon {...p} d='<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>' />;
    const IconUsers    = p => <Icon {...p} d='<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' />;
    const IconAlert    = p => <Icon {...p} d='<circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>' />;
    const IconChevD    = p => <Icon {...p} d='<polyline points="6 9 12 15 18 9"/>' />;
    const IconChevU    = p => <Icon {...p} d='<polyline points="18 15 12 9 6 15"/>' />;
    const IconPin      = p => <Icon {...p} d='<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>' />;
    const IconHome     = p => <Icon {...p} d='<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>' />;

    // ============================================================================
    // UTILITÁRIOS
    // ============================================================================
    const parsePTNumber = (str) => {
        if (str === null || str === undefined || str === '') return 0;
        if (typeof str === 'number') return isNaN(str) ? 0 : str;
        const s = String(str).trim();
        if (!s.includes(',') && !s.includes('.')) return parseFloat(s) || 0;
        if (s.includes(',')) return parseFloat(s.replace(/[R$\s%]/g, '').replace(/\./g, '').replace(',', '.')) || 0;
        return parseFloat(s.replace(/[R$\s%]/g, '').replace(/,/g, '')) || 0;
    };
    const parseBRDateToYMD = (dateStr) => {
        if (!dateStr) return null;
        const parts = dateStr.split('/');
        if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
        if (dateStr.includes('-')) return dateStr;
        return null;
    };

    // ============================================================================
    // CLOCK
    // ============================================================================
    function Clock() {
        const [time, setTime] = useState(new Date());
        useEffect(() => {
            const t = setInterval(() => setTime(new Date()), 1000);
            return () => clearInterval(t);
        }, []);
        return (
            <div style={{ textAlign: 'right' }}>
                <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 36, fontWeight: 700, color: 'white', lineHeight: 1 }}>
                    {time.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' })}
                </div>
                <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.35)', textTransform: 'capitalize', marginTop: 2 }}>
                    {time.toLocaleDateString('pt-PT', { weekday: 'short', day: '2-digit', month: 'short' })}
                </div>
            </div>
        );
    }

    // ============================================================================
    // ECRÃ 1: GRELHA DE OBRAS (Substitui o menu de módulos)
    // ============================================================================
    function useObraDesvio(obra) {
        return useMemo(() => {
            const dados = (obra?.curva?.data || []).filter(d => d.acum_previsto != null && d.acum_previsto !== '');
            const hoje = new Date(); hoje.setHours(23,59,59,0);
            const parseVal = v => { if (v === null || v === undefined || v === '') return null; if (typeof v === 'number') return v; return parseFloat(String(v).replace(',', '.')) || 0; };
            const parseData = (raw) => {
                if (!raw) return null;
                const s = String(raw).trim().split(' ')[0].split('T')[0];
                if (s.includes('/')) { const [d,m,y] = s.split('/'); return new Date(Number(y)<100?2000+Number(y):Number(y), Number(m)-1, Number(d)); }
                if (s.includes('-')) { const [y,m,d] = s.split('-'); return new Date(Number(y), Number(m)-1, Number(d)); }
                return null;
            };
            const passados = dados.filter(d => { const dt = parseData(d.data); return dt && dt <= hoje && parseVal(d.acum_realizado) > 0; });
            const ultimo = passados[passados.length - 1];
            if (!ultimo) return null;
            return parseVal(ultimo.acum_desvio) ?? 0;
        }, [obra]);
    }

    // ============================================================================
    // MAPA DE VÍDEOS POR OBRA
    // ============================================================================
    const OBRA_VIDEOS = {
        "NOVO NORDISK - UB SP": "https://www.dropbox.com/scl/fi/tq2cin4hqbavlgfzohf6m/Novo_Nordisk_Building_Video_Generation.mp4?rlkey=dtsh7rjy67a1pl51lvplaxmwi&st=q3xdvv23&raw=1",
        // "NOVO NORDISK - AP": "https://...",
        // "HITACHI": "https://...",
    };

    function ObraCard({ obra, onClick }) {
        const videoUrl = OBRA_VIDEOS[obra.nome] || null;
        const videoRef = React.useRef(null);

        React.useEffect(() => {
            const v = videoRef.current;
            if (!v) return;
            v.muted = true;
            v.play().catch(() => {});
        }, [videoUrl]);

        const desvio = useObraDesvio(obra);
        const cor    = desvio === null ? '#64748b' : desvio >= 0 ? '#10b981' : desvio > -0.05 ? '#f59e0b' : '#ef4444';
        const corBg  = desvio === null ? 'rgba(100,116,139,' : desvio >= 0 ? 'rgba(16,185,129,' : desvio > -0.05 ? 'rgba(245,158,11,' : 'rgba(239,68,68,';
        
        return (
            <div onClick={onClick} style={{
                position: 'relative', borderRadius: 20, cursor: 'pointer', overflow: 'hidden',
                border: `1px solid ${cor}33`,
                background: videoUrl ? 'transparent' : `linear-gradient(145deg, ${corBg}0.07), rgba(255,255,255,0.01))`,
                boxShadow: `0 0 30px ${cor}14`,
                transition: 'all 0.3s ease',
                padding: '28px 28px 22px',
                display: 'flex', flexDirection: 'column', gap: 14,
                minHeight: 200,
            }}
            onMouseEnter={e => { e.currentTarget.style.transform='translateY(-4px)'; e.currentTarget.style.boxShadow=`0 12px 40px ${cor}30`; e.currentTarget.style.borderColor=`${cor}66`; }}
            onMouseLeave={e => { e.currentTarget.style.transform=''; e.currentTarget.style.boxShadow=`0 0 30px ${cor}14`; e.currentTarget.style.borderColor=`${cor}33`; }}>

                {/* Vídeo de fundo */}
                {videoUrl && (
                    <video
                        ref={videoRef}
                        src={videoUrl}
                        autoPlay muted loop playsInline
                        style={{
                            position: 'absolute', inset: 0, width: '100%', height: '100%',
                            objectFit: 'cover', zIndex: 0, pointerEvents: 'none',
                            transform: 'scale(1.18)',
                        }}
                    />
                )}

                {/* Overlay escuro com gradiente na cor do desvio */}
                {videoUrl && (
                    <div style={{
                        position: 'absolute', inset: 0, zIndex: 1,
                        background: `linear-gradient(160deg, rgba(8,12,20,0.72) 0%, rgba(8,12,20,0.55) 50%, ${corBg}0.45) 100%)`,
                    }} />
                )}

                {/* Barra lateral colorida */}
                <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 5, background: cor, boxShadow: `0 0 12px ${cor}88`, zIndex: 2 }} />

                {/* Conteúdo (acima do vídeo) */}
                <div style={{ position: 'relative', zIndex: 2, color: cor, background: videoUrl ? `${corBg}0.18)` : `${corBg}0.12)`, width: 52, height: 52, borderRadius: 13, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, backdropFilter: videoUrl ? 'blur(4px)' : 'none', border: videoUrl ? `1px solid ${cor}33` : 'none' }}>
                    <IconPin size={26} />
                </div>
                
                <div style={{ position: 'relative', zIndex: 2, flex: 1 }}>
                    <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 11, letterSpacing: '0.15em', color: videoUrl ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.35)', textTransform: 'uppercase', marginBottom: 4 }}>
                        {obra.encarregados ? 'Visão Integrada' : 'Curva S'}
                    </div>
                    <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 26, fontWeight: 800, color: 'white', lineHeight: 1.1, wordBreak: 'break-word', textTransform: 'uppercase', textShadow: videoUrl ? '0 2px 12px rgba(0,0,0,0.8)' : 'none' }}>{obra.nome}</div>
                </div>
                
                {desvio !== null && (
                    <div style={{ position: 'relative', zIndex: 2, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                        <div style={{ display: 'flex', gap: 5 }}>
                            {obra.curva && <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', color: '#10b981', background: 'rgba(16,185,129,0.15)', border: '1px solid rgba(16,185,129,0.3)', padding: '2px 7px', borderRadius: 5, textTransform: 'uppercase', backdropFilter: 'blur(4px)' }}>Curva S</span>}
                            {obra.encarregados && <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', color: '#f59e0b', background: 'rgba(245,158,11,0.15)', border: '1px solid rgba(245,158,11,0.3)', padding: '2px 7px', borderRadius: 5, textTransform: 'uppercase', backdropFilter: 'blur(4px)' }}>Encarregados</span>}
                            {obra.suprimentos?.length > 0 && <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', color: '#a78bfa', background: 'rgba(167,139,250,0.15)', border: '1px solid rgba(167,139,250,0.3)', padding: '2px 7px', borderRadius: 5, textTransform: 'uppercase', backdropFilter: 'blur(4px)' }}>Suprimentos</span>}
                        </div>
                        <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 18, fontWeight: 900, color: cor, textShadow: videoUrl ? `0 0 20px ${cor}` : 'none' }}>
                            {desvio > 0 ? '+' : ''}{(desvio * 100).toFixed(1)}%
                        </div>
                    </div>
                )}
                
                <div style={{ position: 'relative', zIndex: 2, display: 'flex', alignItems: 'center', gap: 6, color: cor, fontSize: 13, fontWeight: 600 }}>
                    <span>Acessar</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
            </div>
        );
    }

    function ObrasGridScreen({ obras, onSelectObra, onOpenRanking }) {
        return (
            <div className="min-h-screen flex flex-col screen-enter" style={{ background: 'linear-gradient(160deg, #080c14 0%, #0d1525 100%)' }}>
                <div className="header-glow px-10 py-6 flex justify-between items-center flex-shrink-0">
                    <div>
                        <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 13, letterSpacing: '0.2em', color: 'rgba(255,255,255,0.35)', textTransform: 'uppercase' }}>MSE Engenharia</div>
                        <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 32, fontWeight: 800, color: 'white', lineHeight: 1.1 }}>Visão por Obras</div>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                        <button onClick={onOpenRanking} style={{
                            display: 'flex', alignItems: 'center', gap: 8,
                            padding: '10px 18px', borderRadius: 12, cursor: 'pointer',
                            background: 'rgba(245,158,11,0.1)', border: '1px solid rgba(245,158,11,0.3)',
                            color: '#f59e0b', fontSize: 13, fontWeight: 700,
                            fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: '0.1em',
                            textTransform: 'uppercase', transition: 'all 0.2s',
                        }}
                            onMouseEnter={e => { e.currentTarget.style.background='rgba(245,158,11,0.2)'; e.currentTarget.style.borderColor='rgba(245,158,11,0.5)'; }}
                            onMouseLeave={e => { e.currentTarget.style.background='rgba(245,158,11,0.1)'; e.currentTarget.style.borderColor='rgba(245,158,11,0.3)'; }}
                        >
                            <IconTrophy size={16} /> Ranking
                        </button>
                        <Clock />
                    </div>
                </div>
                <div className="flex-1 overflow-y-auto custom-scrollbar px-10 pb-8 pt-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {obras.map((obra, index) => (
                            <ObraCard key={obra.nome} obra={obra} onClick={() => onSelectObra(index)} />
                        ))}
                    </div>
                </div>
            </div>
        );
    }


    // ============================================================================
    // GRÁFICO SVG PURO
    // ============================================================================
    function LineSVG({ data, width, height, idxHoje, idxHojeFloat, realColor }) {
        if (!data || data.length < 2) return null;

        const BAR_H = 48;
        const pad = { top: 24, right: 24, bottom: 70 + BAR_H, left: 58 };
        const W = width  - pad.left - pad.right;
        const H = height - pad.top  - pad.bottom;

        const allVals = data.flatMap(d => [d.Previsto, d.Realizado, d.Tendencia]).filter(v => v !== null && v > 0);
        const minV = 0;
        const maxV = Math.max(...allVals) * 1.06 || 1;

        const xScale    = i  => (i / (data.length - 1)) * W;
        const yScale    = v  => H - ((v - minV) / (maxV - minV)) * H;

        const pathFiltered = (key, upToIdxFloat) => {
            const limit = upToIdxFloat !== undefined ? upToIdxFloat : Infinity;
            const pts = data.map((d, i) => ({ v: d[key], i })).filter(p => p.v !== null && p.v > 0 && p.i <= Math.ceil(limit));
            if (pts.length === 0) return '';
            const last = pts[pts.length - 1];
            const prev = pts.length > 1 ? pts[pts.length - 2] : null;
            let finalPts = pts;
            if (upToIdxFloat !== undefined && last.i > limit && prev) {
                const frac = (limit - prev.i) / (last.i - prev.i);
                const vInterp = prev.v + frac * (last.v - prev.v);
                finalPts = [...pts.slice(0, -1), { v: vInterp, i: limit }];
            }
            return finalPts.map((p, j) => `${j === 0 ? 'M' : 'L'} ${xScale(p.i).toFixed(1)} ${yScale(p.v).toFixed(1)}`).join(' ');
        };
        const pathAll = (key) => pathFiltered(key, undefined);

        const yTicks = Array.from({ length: 6 }, (_, i) => maxV * (i / 5));
        const minSpacingPx = 44;
        const maxLabels = Math.max(2, Math.floor(W / minSpacingPx));
        const step = Math.max(1, Math.ceil(data.length / maxLabels));
        const xLabelIndices = [];
        for (let i = 0; i < data.length; i += step) xLabelIndices.push(i);
        if (xLabelIndices[xLabelIndices.length - 1] !== data.length - 1) xLabelIndices.push(data.length - 1);

        const xHojeF = (idxHojeFloat !== undefined && idxHojeFloat >= 0)
            ? xScale(idxHojeFloat)
            : (idxHoje >= 0 ? xScale(idxHoje) : null);

        const barW = xLabelIndices.length > 1
            ? Math.max(4, (xScale(xLabelIndices[1]) - xScale(xLabelIndices[0])) * 0.35)
            : 8;
        const maxSem = Math.max(...data.map(d => Math.max(d.SemPrevisto || 0, d.SemRealizado || 0)));
        const semScale = v => maxSem > 0 ? (v / maxSem) * BAR_H : 0;

        const parseDataRaw = (raw) => {
            if (!raw) return null;
            const s = String(raw).trim().split(' ')[0].split('T')[0];
            if (s.includes('/')) {
                const parts = s.split('/');
                if (parts.length === 3) {
                    let [a, b, c] = parts.map(Number);
                    if (c >= 100) {
                        const d = a > 12 ? a : (b > 12 ? b : a);
                        const m = a > 12 ? b : (b > 12 ? a : b);
                        return new Date(c, m - 1, d);
                    } else { return new Date(2000 + c, b - 1, a); }
                }
            }
            if (s.includes('-')) { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); }
            return null;
        };
        const fmtDate = (raw) => {
            const dt = parseDataRaw(raw);
            if (!dt || isNaN(dt)) return String(raw || '').split(' ')[0];
            return String(dt.getDate()).padStart(2,'0') + '/' + String(dt.getMonth() + 1).padStart(2,'0') + '/' + String(dt.getFullYear()).slice(-2);
        };

        const lineColor     = realColor || '#10b981';
        const lineColorFade = lineColor + '66';
        const barZoneY      = H + 8;

        return (
            <svg width={width} height={height} style={{ overflow: 'visible' }}>
                <defs>
                    <linearGradient id="gradReal" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor={lineColor} stopOpacity="0.18" />
                        <stop offset="100%" stopColor={lineColor} stopOpacity="0" />
                    </linearGradient>
                    <linearGradient id="gradTend" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor="#64748b" stopOpacity="0.10" />
                        <stop offset="100%" stopColor="#64748b" stopOpacity="0" />
                    </linearGradient>
                    <clipPath id="clipLines"><rect x={0} y={0} width={W} height={H} /></clipPath>
                </defs>
                <g transform={`translate(${pad.left},${pad.top})`}>

                    {/* Grid horizontal */}
                    {yTicks.map((v, i) => (
                        <g key={i}>
                            <line x1={0} y1={yScale(v)} x2={W} y2={yScale(v)} stroke="rgba(255,255,255,0.05)" strokeWidth={1} />
                            <text x={-10} y={yScale(v) + 4} textAnchor="end" fill="rgba(255,255,255,0.28)" fontSize={11} fontFamily="Barlow, sans-serif">{(v * 100).toFixed(0)}%</text>
                        </g>
                    ))}

                    {/* Grid vertical */}
                    {xLabelIndices.map((xi, i) => (
                        <line key={i} x1={xScale(xi)} y1={0} x2={xScale(xi)} y2={H} stroke="rgba(255,255,255,0.03)" strokeWidth={1} />
                    ))}

                    {/* Área Realizado */}
                    {pathFiltered('Realizado', idxHojeFloat !== undefined ? idxHojeFloat : idxHoje) && (
                        <path clipPath="url(#clipLines)"
                            d={pathFiltered('Realizado', idxHojeFloat !== undefined ? idxHojeFloat : idxHoje) + ' L ' + xScale(idxHojeFloat !== undefined ? idxHojeFloat : idxHoje) + ' ' + H + ' L 0 ' + H + ' Z'}
                            fill="url(#gradReal)" />
                    )}

                    {/* Área Tendência */}
                    {pathAll('Tendencia') && (
                        <path clipPath="url(#clipLines)"
                            d={pathAll('Tendencia') + ' L ' + xScale(data.length-1) + ' ' + H + ' L ' + xScale(idxHoje >= 0 ? idxHoje : 0) + ' ' + H + ' Z'}
                            fill="url(#gradTend)" />
                    )}

                    {/* Linha Previsto */}
                    <path clipPath="url(#clipLines)" d={pathAll('Previsto')} fill="none" stroke="#60a5fa" strokeWidth={2} strokeDasharray="8 4" strokeLinecap="round" opacity={0.7} />

                    {/* Linha Realizado */}
                    <path clipPath="url(#clipLines)"
                        d={pathFiltered('Realizado', idxHojeFloat !== undefined ? idxHojeFloat : idxHoje)}
                        fill="none" stroke={lineColor} strokeWidth={3} strokeLinecap="round"
                        style={{ filter: 'drop-shadow(0 0 6px ' + lineColorFade + ')' }} />

                    {/* Linha Tendência */}
                    <path clipPath="url(#clipLines)" d={pathAll('Tendencia')} fill="none" stroke="#64748b" strokeWidth={2} strokeDasharray="5 3" strokeLinecap="round" opacity={0.7} />

                    {/* Linha vertical Hoje */}
                    {xHojeF !== null && (
                        <g>
                            <line x1={xHojeF} y1={0} x2={xHojeF} y2={H} stroke="rgba(255,255,255,0.25)" strokeWidth={1.5} strokeDasharray="4 3" />
                            <text x={xHojeF + 5} y={14} fill="rgba(255,255,255,0.4)" fontSize={10} fontFamily="Barlow, sans-serif" fontWeight={600}>HOJE</text>

                    {/* Rótulos Realizado */}
                    {xLabelIndices.map((xi, i) => {

                                </text>
                            </g>
                        );
                    })}

                    {/* Rótulos Previsto */}
                    {xLabelIndices.map((xi, i) => {
                        const d = data[xi];
                        if (!d.Previsto || d.Previsto <= 0 || xi <= idxHoje) return null;
                        const x = xScale(xi), y = yScale(d.Previsto), pct = (d.Previsto * 100).toFixed(1) + '%';
                        const labelY = y < 18 ? y + 16 : y - 8;
                        const anchor = x < 30 ? 'start' : x > W - 30 ? 'end' : 'middle';
                        return (
                            <g key={'pl-' + i}>
                                <circle cx={x} cy={y} r={3} fill="#60a5fa" opacity={0.6} />
                                <text x={x} y={labelY} textAnchor={anchor}

                                    fontFamily="Barlow Condensed, Barlow, sans-serif" fontWeight={500}>
                                    {pct}
                                </text>
                            </g>
                        );
                    })}

                    {/* BARRAS SEMANAIS */}
                    <line x1={0} y1={barZoneY} x2={W} y2={barZoneY} stroke="rgba(255,255,255,0.06)" strokeWidth={1} />
                    <text x={-10} y={barZoneY + BAR_H / 2 + 4} textAnchor="end" fill="rgba(255,255,255,0.2)" fontSize={9} fontFamily="Barlow, sans-serif">sem.</text>

                    {xLabelIndices.map((xi, i) => {
                        const d = data[xi], x = xScale(xi), isPast = xi <= idxHoje;
                        const semP = d.SemPrevisto || 0, semR = d.SemRealizado || 0;
                        if (semP <= 0 && semR <= 0) return null;
                        const hP = semScale(semP), hR = semScale(semR), offset = barW * 0.55;
                        return (
                            <g key={'bar-' + i}>
                                {semP > 0 && (
                                    <g>
                                        <rect x={x - offset - barW / 2} y={barZoneY + BAR_H - hP} width={barW} height={hP} fill="#60a5fa" opacity={0.35} rx={2} />

                                    </g>

                                {semR > 0 && isPast && (
                                    <g>
                                        <rect x={x + offset - barW / 2} y={barZoneY + BAR_H - hR} width={barW} height={hR} fill={lineColor} opacity={0.6} rx={2} />
                                        <text x={x + offset} y={barZoneY + BAR_H - hR - 3} textAnchor="middle" fill={lineColor} fontSize={8} fontFamily="Barlow Condensed, Barlow, sans-serif" fontWeight={700}>{(semR * 100).toFixed(1)}%</text>
                                    </g>

                    {/* Labels eixo X */}
                    {xLabelIndices.map((xi, i) => {

                            </g>
                        );

                    {/* Eixos */}
                    <line x1={0} y1={0} x2={0} y2={H} stroke="rgba(255,255,255,0.08)" />
                    <line x1={0} y1={H} x2={W} y2={H} stroke="rgba(255,255,255,0.08)" />

    function CurvaChart({ chartData, idxHoje, idxHojeFloat, realColor }) {
        const ref = useRef(null);
        const [size, setSize] = useState({ w: 0, h: 0 });
        useEffect(() => {
            if (!ref.current) return;
            const rect = ref.current.getBoundingClientRect();
            if (rect.width > 0) setSize({ w: rect.width, h: rect.height });
            const ro = new ResizeObserver(entries => {
                const { width, height } = entries[0].contentRect;
                if (width > 0) setSize({ w: width, h: height });
            });
            ro.observe(ref.current);
            return () => ro.disconnect();
        }, []);
        return (
            <div ref={ref} style={{ width: '100%', height: '100%' }}>
                {size.w > 0
                    ? <LineSVG data={chartData} width={size.w} height={size.h || 400} idxHoje={idxHoje} idxHojeFloat={idxHojeFloat} realColor={realColor} />
                    : <LineSVG data={chartData} width={window.innerWidth - 60} height={400} idxHoje={idxHoje} idxHojeFloat={idxHojeFloat} realColor={realColor} />
                }
            </div>
        );
    }

            const seteDiasAtras = new Date(ontem); seteDiasAtras.setDate(ontem.getDate() - 6); seteDiasAtras.setHours(0,0,0,0);
            let totalDias = 0;
            for (let i = 0; i < 7; i++) {
                const dL = new Date(seteDiasAtras); dL.setDate(seteDiasAtras.getDate() + i);
                if (dL > ontem) break; // não conta dias além de ontem
                if (dL.getDay() !== 0 && dL.getDay() !== 6) totalDias++;
            }
            totalDias = totalDias || 1;
            const parseVal = v => { if (v == null || v === '') return null; if (typeof v === 'number') return v; return parseFloat(String(v).replace(',', '.')) || 0; };
            const parseDC = (raw) => {
                if (!raw) return null;
                const s = String(raw).trim().split(' ')[0].split('T')[0];
                if (s.includes('/')) { const [d,m,y] = s.split('/'); return new Date(+y<100?2000+ +y:+y,+m-1,+d); }
                if (s.includes('-')) { const [y,m,d] = s.split('-'); return new Date(+y,+m-1,+d); }
                return null;
            };
            return obras.map(obra => {
                let avgAder = 0, avgAssid = 0, nEnc = 0;
                if (obra?.encarregados?.data) {

                }
                const score = (avgAssid * 0.60) + (avgAder * 0.15) + (desvioScore * 0.25);
                return { nome: obra.nome, score, aderencia: avgAder, assiduidade: avgAssid, desvioScore, nEnc };

                    <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 14, fontWeight: 700, letterSpacing: '0.14em', color: 'rgba(255,255,255,0.6)', textTransform: 'uppercase' }}>Ranking de Obras — Últimos 7 dias</div>
                    <div style={{ marginLeft: 'auto', fontSize: 11, color: 'rgba(255,255,255,0.25)', fontFamily: "'Barlow Condensed', sans-serif" }}>60% Assiduidade · 15% Aderência Física · 25% Curva S</div>
                </div>

    // ============================================================================
    // VISUALIZAÇÃO PRINCIPAL (DASHBOARD VIEWER)
    // ============================================================================
    const IDLE_TIMEOUT = 5 * 60 * 1000; // 5 minutos

    function DashboardViewer({ obras, initialIdx, onHome }) {
        const [currentIdx, setCurrentIdx] = useState(initialIdx);
        const [obraKey, setObraKey]       = useState(Date.now());
        const [loopAtivo, setLoopAtivo]   = useState(false);
        const [sectionLoop, setSectionLoop] = useState(0); 
        const intervalRef                 = useRef(null);
        const idleRef                     = useRef(null);
        const scrollLoopRef               = useRef(null);
        const scrollingLoopRef            = useRef(false);

        // Reinicia timer de idle; ao expirar, ativa o loop
        const resetIdle = useCallback(() => {
            clearTimeout(idleRef.current);
            idleRef.current = setTimeout(() => {
                setLoopAtivo(true);
            }, IDLE_TIMEOUT);
        }, []);

        // Registra eventos de interação para resetar idle
        useEffect(() => {
            const events = ['mousemove', 'mousedown', 'keydown', 'touchstart', 'click'];
            const onActivity = () => {
                setLoopAtivo(false);
                resetIdle();
            };
            events.forEach(ev => window.addEventListener(ev, onActivity));
            resetIdle(); // inicia o timer ao montar
            return () => {
                events.forEach(ev => window.removeEventListener(ev, onActivity));
                clearTimeout(idleRef.current);
            };
        }, [resetIdle]);

        // Ao receber um novo initialIdx, atualiza a vista principal
        useEffect(() => {
            setCurrentIdx(initialIdx);
            setSectionLoop(0);
        }, [initialIdx]);

        const goTo = (idx) => {
            setCurrentIdx(idx);
            setObraKey(Date.now());
        };
        const goPrev = () => goTo((currentIdx - 1 + obras.length + 1) % (obras.length + 1));
        const goNext = () => goTo((currentIdx + 1) % (obras.length + 1));

        const isRanking = currentIdx === obras.length;
        const obra  = isRanking ? null : obras[currentIdx];
        const dados = obra?.curva?.data || [];

        // Scroll entre seções dentro da obra
        const handleWheelLoop = useCallback((e) => {
            e.preventDefault();
            if (scrollingLoopRef.current) return;
            const dir = e.deltaY > 0 ? 1 : -1;
            const hasSupr = !!(obra?.suprimentos?.length);
            const hasEnc  = !!(obra?.encarregados);
            const maxSec  = (hasSupr ? 1 : 0) + (hasEnc ? 1 : 0);
            const next = Math.max(0, Math.min(maxSec, sectionLoop + dir));
            if (next !== sectionLoop) {
                setSectionLoop(next);
                scrollingLoopRef.current = true;
                setTimeout(() => { scrollingLoopRef.current = false; }, 700);
            }
        }, [sectionLoop, obra]);

        useEffect(() => {
            const el = scrollLoopRef.current;
            if (!el) return;
            el.addEventListener('wheel', handleWheelLoop, { passive: false });
            return () => el.removeEventListener('wheel', handleWheelLoop);
        }, [handleWheelLoop]);

        useEffect(() => {
            const el = scrollLoopRef.current;
            if (!el) return;
            el.scrollTo({ top: sectionLoop * el.clientHeight, behavior: 'smooth' });
        }, [sectionLoop, obraKey]);

        // Avança seção e troca de obra em sequência — só roda se loopAtivo
        useEffect(() => {
            if (!loopAtivo || obras.length === 0) { clearInterval(intervalRef.current); return; }
            clearInterval(intervalRef.current);
            const hasSupr = !!(obra?.suprimentos?.length);
            const hasEnc  = !!(obra?.encarregados);
            const maxSec  = (hasSupr ? 1 : 0) + (hasEnc ? 1 : 0);

            if (sectionLoop < maxSec) {
                intervalRef.current = setInterval(() => {
                    setSectionLoop(s => s + 1);
                }, SLIDE_DURATION);
            } else {
                intervalRef.current = setInterval(() => {
                    setCurrentIdx(prev => (prev + 1) % (obras.length + 1));
                    setObraKey(Date.now());
                    setSectionLoop(0);
                }, SLIDE_DURATION);
            }
            return () => clearInterval(intervalRef.current);
        }, [obraKey, sectionLoop, loopAtivo, obras.length]);

        const parseVal = v => {
            if (v === null || v === undefined || v === '') return null;
            if (typeof v === 'number') return v;
            return parseFloat(String(v).replace(',', '.')) || 0;
        };
        const parseDataCorte = (raw) => {
            if (!raw) return null;
            const s = String(raw).trim().split(' ')[0].split('T')[0];
            if (s.includes('/')) {
                const [d, m, y] = s.split('/');
                return new Date(Number(y) < 100 ? 2000 + Number(y) : Number(y), Number(m) - 1, Number(d));
            }
            if (s.includes('-')) { const [y, m, d] = s.split('-'); return new Date(Number(y), Number(m) - 1, Number(d)); }
            return null;
        };
        const fmtDataCorte = (raw) => {
            const dt = parseDataCorte(raw);
            if (!dt) return '';
            return dt.toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit' });
        };

        const chartData = useMemo(() => dados
            .filter(d => d.acum_previsto !== null && d.acum_previsto !== '' && d.acum_previsto !== undefined)
            .map(d => ({
                semana:       Number(d.semana),
                data:         d.data,
                Realizado:    parseVal(d.acum_realizado),
                Previsto:     parseVal(d.acum_previsto),
                Tendencia:    parseVal(d.acum_tendencia),
                Desvio:       parseVal(d.acum_desvio),
                SemRealizado: parseVal(d.semanal_realizado),
                SemPrevisto:  parseVal(d.semanal_previsto),
            })), [obra]);

        const hoje = new Date(); hoje.setHours(23, 59, 59, 0);
        const cortesPassados = chartData.filter(d => { const dt = parseDataCorte(d.data); return dt && dt <= hoje && d.Realizado && d.Realizado > 0; });
        const ultimoReal     = cortesPassados.length > 0 ? cortesPassados[cortesPassados.length - 1] : null;
        const idxHoje        = ultimoReal ? chartData.findIndex(d => d.semana === ultimoReal.semana) : -1;
        const desvioAtual    = ultimoReal?.Desvio ?? 0;
        const desvioColor    = desvioAtual >= 0 ? '#10b981' : desvioAtual > -0.05 ? '#f59e0b' : '#ef4444';
        const realColor      = desvioColor;
        const dataCorteLabel = ultimoReal ? fmtDataCorte(ultimoReal.data) : '';

        const proxCorte = chartData.find((d, i) => { const dt = parseDataCorte(d.data); return i > idxHoje && dt && dt > hoje && d.Previsto > 0; });
        let idxHojeFloat = idxHoje;
        if (idxHoje >= 0 && proxCorte) {
            const dtUltimo = parseDataCorte(ultimoReal.data);
            const dtProx   = parseDataCorte(proxCorte.data);
            const idxProx  = chartData.findIndex(d => d.semana === proxCorte.semana);
            if (dtUltimo && dtProx && dtProx > dtUltimo) {
                const frac = Math.min(1, Math.max(0, (hoje - dtUltimo) / (dtProx - dtUltimo)));
                idxHojeFloat = idxHoje + frac * (idxProx - idxHoje);
            }

    // ============================================================================

    // Gráfico de pizza SVG interativo
    function PieChart({ slices, onSliceClick, activeStatus, size = 160 }) {
        const cx = size / 2, cy = size / 2;
        const r = size / 2 - 8;
        const total = slices.reduce((s, sl) => s + sl.value, 0);
        if (total === 0) return null;
        let cumAngle = -Math.PI / 2;
        const paths = slices.map(sl => {
            const angle = (sl.value / total) * 2 * Math.PI;
            const startAngle = cumAngle;
            cumAngle += angle;
            const endAngle = cumAngle;
            const isActive = activeStatus === sl.status;
            // fatia ativa sai levemente do centro
            const offsetR = isActive ? 10 : 0;
            const midAngle = startAngle + angle / 2;
            const ox = Math.cos(midAngle) * offsetR;
            const oy = Math.sin(midAngle) * offsetR;
            const x1 = cx + ox + r * Math.cos(startAngle), y1 = cy + oy + r * Math.sin(startAngle);
            const x2 = cx + ox + r * Math.cos(endAngle),   y2 = cy + oy + r * Math.sin(endAngle);
            const largeArc = angle > Math.PI ? 1 : 0;
            const d = `M ${cx+ox} ${cy+oy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
            const labelR = r * 0.65;
            const lx = cx + ox + labelR * Math.cos(midAngle), ly = cy + oy + labelR * Math.sin(midAngle);
            return { ...sl, d, lx, ly, angle, isActive, midAngle, ox, oy };
        });
        const innerR = r * 0.30;
        const activeSlice = activeStatus ? slices.find(s => s.status === activeStatus) : null;
        return (
            <svg width={size} height={size} style={{ cursor: 'pointer', overflow: 'visible', filter: 'drop-shadow(0 6px 20px rgba(0,0,0,0.6))' }}>
                {paths.map((p, i) => (
                    <g key={i} onClick={() => onSliceClick(p.status)}>
                        <path d={p.d} fill={p.cor}
                            opacity={activeStatus && !p.isActive ? 0.25 : 1}
                            stroke="#080c14" strokeWidth={p.isActive ? 2.5 : 1}
                            style={{ transition: 'all 0.3s ease' }}
                        />
                        {p.angle > 0.3 && (
                            <text x={p.lx} y={p.ly} textAnchor="middle" dominantBaseline="middle"
                                style={{ fontSize: size > 200 ? 15 : 11, fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 900, fill: 'rgba(255,255,255,0.92)', pointerEvents: 'none' }}>
                                {p.value}
                            </text>
                        )}
                    </g>
                ))}
                {/* Anel central */}
                <circle cx={cx} cy={cy} r={innerR} fill="#080c14" />
                {/* Centro: total ou status ativo */}
                {activeSlice ? (
                    <>
                        <text x={cx} y={cy - 8} textAnchor="middle" dominantBaseline="middle"
                            style={{ fontSize: size > 200 ? 28 : 18, fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 900, fill: activeSlice.cor }}>
                            {activeSlice.value}
                        </text>
                        <text x={cx} y={cy + 10} textAnchor="middle" dominantBaseline="middle"
                            style={{ fontSize: size > 200 ? 9 : 7, fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fill: 'rgba(255,255,255,0.35)', letterSpacing: '0.06em' }}>
                            ITENS
                        </text>
                    </>
                ) : (
                    <>
                        <text x={cx} y={cy - 8} textAnchor="middle" dominantBaseline="middle"
                            style={{ fontSize: size > 200 ? 28 : 18, fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 900, fill: 'white' }}>
                            {total}
                        </text>
                        <text x={cx} y={cy + 10} textAnchor="middle" dominantBaseline="middle"
                            style={{ fontSize: size > 200 ? 9 : 7, fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fill: 'rgba(255,255,255,0.35)', letterSpacing: '0.06em' }}>
                            TOTAL
                        </text>
                    </>
                )}
            </svg>
        );
    }

    function SuprimentosSection({ obra, desvioColor, onScrollUp, onScrollDown, hasEnc }) {
        const hoje = new Date(); hoje.setHours(0,0,0,0);
        const [activeStatus, setActiveStatus] = useState(null);

        const parseData = (raw) => {
            if (!raw) return null;
            const s = String(raw).trim().split(' ')[0].split('T')[0];
            if (s.includes('/')) { const [d,m,y] = s.split('/'); return new Date(+y<100?2000+ +y:+y,+m-1,+d); }
            if (s.includes('-')) { const [y,m,d] = s.split('-'); return new Date(+y,+m-1,+d); }
            return null;
        };
        const fmtData = (raw) => { const d = parseData(raw); if (!d) return '—'; return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }); };
        const diasRestantes = (raw) => { const d = parseData(raw); if (!d) return null; return Math.round((d - hoje) / 86400000); };

        const STATUS_CONFIG = {
            'ENTREGUE':             { cor: '#10b981', bg: 'rgba(16,185,129,0.15)',  label: 'Entregue'     },
            'EM OBRA':              { cor: '#10b981', bg: 'rgba(16,185,129,0.10)',  label: 'Em Obra'      },
            'COMPRADO':             { cor: '#60a5fa', bg: 'rgba(59,130,246,0.15)',  label: 'Comprado'     },
            'COMPRA PARCIAL':       { cor: '#3b82f6', bg: 'rgba(59,130,246,0.10)',  label: 'Compra Parc.' },
            'ENTREGUE PARCIAL':     { cor: '#f59e0b', bg: 'rgba(245,158,11,0.15)', label: 'Entr. Parc.'  },
            'EM APROVAÇÃO INTERNA': { cor: '#a78bfa', bg: 'rgba(167,139,250,0.15)', label: 'Em Aprovação' },
        };
        const getStatusCor   = (s) => STATUS_CONFIG[s]?.cor   || '#64748b';
        const getStatusBg    = (s) => STATUS_CONFIG[s]?.bg    || 'rgba(100,116,139,0.15)';
        const getStatusLabel = (s) => STATUS_CONFIG[s]?.label || s;
        const isConcluido    = (s) => s === 'ENTREGUE' || s === 'EM OBRA';
        const isComprado     = (s) => s === 'COMPRADO' || s === 'COMPRA PARCIAL';

        const itens = obra.suprimentos || [];
        const contagem = {};
        itens.forEach(it => { const s = it.status || 'SEM STATUS'; contagem[s] = (contagem[s] || 0) + 1; });
        const total      = itens.length;
        const concluidos = itens.filter(it => isConcluido(it.status)).length;
        const comprados  = itens.filter(it => isComprado(it.status)).length;
        const avancados  = concluidos + comprados;
        const pctConc    = total > 0 ? Math.round((concluidos / total) * 100) : 0;
        const pctComp    = total > 0 ? Math.round((comprados  / total) * 100) : 0;
        const pctAvancado= total > 0 ? Math.round((avancados  / total) * 100) : 0;

        const pieSlices = useMemo(() => {
            const allKeys = [...new Set(itens.map(it => it.status || 'SEM STATUS'))];
            return allKeys.filter(s => contagem[s] > 0)
                .map(s => ({ status: s, value: contagem[s], cor: getStatusCor(s), label: getStatusLabel(s) }));
        }, [itens]);

        const handleSliceClick = (status) => setActiveStatus(prev => prev === status ? null : status);

        const urgenciaCor   = (dias) => { if (dias === null) return '#64748b'; if (dias < 0) return '#ef4444'; if (dias <= 7) return '#f97316'; if (dias <= 21) return '#f59e0b'; return '#60a5fa'; };
        const urgenciaLabel = (dias) => { if (dias === null) return 'Sem data'; if (dias < 0) return `${Math.abs(dias)}d atrasado`; if (dias === 0) return 'Hoje'; return `${dias}d`; };

        const criticos3Semanas = useMemo(() => itens
            .filter(it => !isConcluido(it.status))
            .map(it => ({ ...it, _dias: diasRestantes(it.data_limite_obra) }))
            .filter(it => it._dias !== null && it._dias <= 21)
            .sort((a, b) => a._dias - b._dias),
        [itens]);

        // Itens do status selecionado (para o painel expandido)
        const itensDoStatus = useMemo(() => {
            if (!activeStatus) return [];
            return itens
                .filter(it => (it.status || 'SEM STATUS') === activeStatus)
                .map(it => ({ ...it, _dias: diasRestantes(it.data_limite_obra) }))
                .sort((a, b) => {
                    if (a._dias === null && b._dias === null) return 0;
                    if (a._dias === null) return 1;
                    if (b._dias === null) return -1;
                    return a._dias - b._dias;
                });
        }, [itens, activeStatus]);

        const ItemCard = ({ it }) => {
            const dias   = it._dias;
            const urgCor = urgenciaCor(dias);
            const stCor  = getStatusCor(it.status);
            return (
                <div style={{
                    display: 'flex', alignItems: 'center', gap: 12,
                    padding: '9px 14px', borderRadius: 11, flexShrink: 0,
                    background: dias !== null && dias < 0 ? 'rgba(239,68,68,0.07)' : 'rgba(255,255,255,0.025)',
                    border: `1px solid ${dias !== null && dias < 0 ? 'rgba(239,68,68,0.22)' : 'rgba(255,255,255,0.06)'}`,
                }}>
                    <div style={{ flexShrink: 0, width: 58, textAlign: 'center' }}>
                        <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 17, fontWeight: 900, color: urgCor, lineHeight: 1 }}>{urgenciaLabel(dias)}</div>

    // Seção de encarregados
    function LoopEncSection({ obra, desvioColor, onScrollUp }) {
        const { aggregatedData, topEncarregado, globalStats } = useMemo(() => {
            if (!obra?.encarregados?.data) return { aggregatedData: [], topEncarregado: null, globalStats: { meta: 0, avanco: 0 } };
            const hoje = new Date(); hoje.setHours(23,59,59,999);
            const ontem = new Date(hoje); ontem.setDate(hoje.getDate() - 1); ontem.setHours(23,59,59,999);
            const seteDiasAtras = new Date(ontem); seteDiasAtras.setDate(ontem.getDate() - 6); seteDiasAtras.setHours(0,0,0,0);
            const diasSet = new Set(); let globalMeta = 0, globalAvanco = 0; const supervisorMap = {};
            obra.encarregados.data.forEach(row => {
                const resp = row['RESPONSÁVEL']; if (!resp) return;
                const dataYMD = parseBRDateToYMD(row['DATA']);
                if (!dataYMD) return;
                const dt = new Date(dataYMD + 'T12:00:00'); if (dt < seteDiasAtras || dt > ontem) return;
                const meta = parsePTNumber(row['META DO DIA']); const avanco = parsePTNumber(row['AVANÇO REGISTRADO']);
                globalMeta += meta; globalAvanco += avanco;
                if (dataYMD) diasSet.add(dataYMD);
                if (!supervisorMap[resp]) supervisorMap[resp] = { nome: resp, metaTotal: 0, avancoTotal: 0, diasApontados: new Set() };
                supervisorMap[resp].metaTotal += meta; supervisorMap[resp].avancoTotal += avanco;
                if (dataYMD) supervisorMap[resp].diasApontados.add(dataYMD);
            });
            // Denominador: dias do período (seteDiasAtras até ontem inclusive) que não são fim de semana
            let totalDias = 0;
            for (let i = 0; i < 7; i++) {
                const d = new Date(seteDiasAtras); d.setDate(seteDiasAtras.getDate() + i);
                if (d > ontem) break; // não conta dias além de ontem
                if (d.getDay() !== 0 && d.getDay() !== 6) totalDias++;
            }
            totalDias = totalDias || 1;
            const arr = Object.values(supervisorMap).map(s => {
                const aderencia = s.metaTotal > 0 ? (s.avancoTotal / s.metaTotal) * 100 : 0;
                // Numerador: dias apontados; se apontou num domingo ou sábado, conta no numerador E no denominador
                let diasNumerador = 0;
                let denominadorExtra = 0;
                s.diasApontados.forEach(dataYMD => {
                    const dt = new Date(dataYMD + 'T12:00:00');
                    diasNumerador++;
                    if (dt.getDay() === 0 || dt.getDay() === 6) denominadorExtra++; // domingo ou sábado com apontamento entra no denom
                });
                const assiduidade = (diasNumerador / (totalDias + denominadorExtra)) * 100;
                const score = (aderencia * 0.15) + (assiduidade * 0.85);
                return { ...s, aderencia, assiduidade, score };
            }).sort((a, b) => b.score - a.score);
            const avgAderencia = arr.length > 0 ? arr.reduce((sum, s) => sum + s.aderencia, 0) / arr.length : 0;
            const avgAssiduidade = arr.length > 0 ? arr.reduce((sum, s) => sum + s.assiduidade, 0) / arr.length : 0;
            return { aggregatedData: arr, topEncarregado: arr[0] || null, globalStats: { meta: globalMeta, avanco: globalAvanco, avgAderencia, avgAssiduidade } };
        }, [obra]);
        const aderenciaGlobal = globalStats.avgAderencia ?? 0;
        const assiduidadeGlobal = globalStats.avgAssiduidade ?? 0;

        return (
            <div style={{ height: '100%', display: 'flex', flexDirection: 'column', padding: '6px 20px 10px', gap: 10 }}>
                {/* Título */}
                <div style={{ flexShrink: 0, display: 'flex', alignItems: 'center', gap: 12, padding: '8px 14px', background: 'rgba(245,158,11,0.08)', border: '1px solid rgba(245,158,11,0.18)', borderRadius: 12 }}>
                    <IconTrophy size={16} style={{ color: '#f59e0b' }} />
                    <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 13, fontWeight: 700, letterSpacing: '0.12em', color: 'rgba(255,255,255,0.5)', textTransform: 'uppercase' }}>
                        Performance de Encarregados
                    </div>
                    <button onClick={onScrollUp} style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, color: 'rgba(255,255,255,0.35)', background: 'none', border: 'none', cursor: 'pointer', fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: '0.1em' }}>
                        <IconChevU size={14} /> CURVA S
                    </button>
                </div>
                {/* KPIs */}
                <div style={{ flexShrink: 0, display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, height: 100 }}>
                    <div style={{ background: 'linear-gradient(135deg, #f59e0b, #d97706)', borderRadius: 14, padding: '10px 16px', display: 'flex', flexDirection: 'column', justifyContent: 'space-between', position: 'relative', overflow: 'hidden' }}>
                        <IconTrophy size={70} style={{ position: 'absolute', right: -10, bottom: -10, color: 'rgba(255,255,255,0.12)' }} />
                        <div style={{ fontSize: 10, letterSpacing: '0.15em', color: 'rgba(255,255,255,0.7)', textTransform: 'uppercase', fontWeight: 600 }}>Destaque</div>
                        <div>
                            <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 24, fontWeight: 800, color: 'white', lineHeight: 1 }}>{topEncarregado ? (n => n.length <= 2 ? n.join(' ') : n[0] + ' ' + n[n.length-1])(topEncarregado.nome.split(' ')) : '—'}</div>
                            <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 17, fontWeight: 700, color: 'rgba(255,255,255,0.8)' }}>{topEncarregado ? topEncarregado.score.toFixed(1) : 0}% score</div>
                        </div>
                    </div>
                    <div style={{ background: 'rgba(59,130,246,0.08)', border: '1px solid rgba(59,130,246,0.15)', borderRadius: 14, padding: '10px 16px', display: 'flex', flexDirection: 'column', justifyContent: 'space-between' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start' }}>
                            <div style={{ fontSize: 10, letterSpacing: '0.15em', color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase', fontWeight: 600 }}>Aderência Física</div>
                            <IconTrend size={17} style={{ color: '#3b82f6' }} />
                        </div>
                        <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 42, fontWeight: 900, color: 'white', lineHeight: 1 }}>{aderenciaGlobal.toFixed(1)}%</div>
                    </div>
                    <div style={{ background: 'rgba(16,185,129,0.08)', border: '1px solid rgba(16,185,129,0.15)', borderRadius: 14, padding: '10px 16px', display: 'flex', flexDirection: 'column', justifyContent: 'space-between' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start' }}>
                            <div style={{ fontSize: 10, letterSpacing: '0.15em', color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase', fontWeight: 600 }}>Assiduidade da Obra</div>
                            <IconUsers size={17} style={{ color: '#10b981' }} />
                        </div>
                        <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 42, fontWeight: 900, color: '#10b981', lineHeight: 1 }}>{assiduidadeGlobal.toFixed(1)}%</div>
                    </div>
                </div>
                {/* Tabela */}
                <div style={{ flex: 1, minHeight: 0, borderRadius: 14, overflow: 'hidden', display: 'flex', flexDirection: 'column', background: 'rgba(255,255,255,0.02)', border: '1px solid rgba(255,255,255,0.06)' }}>
                    <div style={{ overflowY: 'auto', flex: 1 }} className="custom-scrollbar">
                        <table style={{ width: '100%', textAlign: 'left', borderCollapse: 'collapse' }}>
                            <thead style={{ position: 'sticky', top: 0, zIndex: 20, background: '#0d1525' }}>
                                <tr style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.12em', color: 'rgba(255,255,255,0.35)', fontWeight: 700 }}>
                                    {['Pos','Encarregado','Meta Σ','Avanço Σ','Aderência F.','Assiduidade','Score Final'].map((h, i) => (
                                        <th key={h} style={{ padding: '12px 16px', textAlign: i > 1 ? 'right' : 'left' }}>{h}</th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {aggregatedData.map((row, idx) => {
                                    const scoreCor = row.score >= 100 ? '#10b981' : row.score >= 80 ? '#60a5fa' : '#f87171';
                                    const scoreBg  = row.score >= 100 ? 'rgba(16,185,129,0.13)' : row.score >= 80 ? 'rgba(59,130,246,0.13)' : 'rgba(239,68,68,0.13)';
                                    return (
                                        <tr key={idx} style={{ borderTop: '1px solid rgba(255,255,255,0.04)', background: idx === 0 ? 'rgba(245,158,11,0.05)' : 'transparent' }}>
                                            <td style={{ padding: '10px 16px' }}><span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 19, fontWeight: 800, color: idx === 0 ? '#f59e0b' : 'rgba(255,255,255,0.22)' }}>#{idx + 1}</span></td>
                                            <td style={{ padding: '10px 16px', fontSize: 16, fontWeight: 700, color: idx === 0 ? '#f59e0b' : 'white' }}>{row.nome}</td>
                                            <td style={{ padding: '10px 16px', textAlign: 'right', fontSize: 14, color: 'rgba(255,255,255,0.5)' }}>{row.metaTotal.toLocaleString('pt-PT', { maximumFractionDigits: 0 })}</td>
                                            <td style={{ padding: '10px 16px', textAlign: 'right', fontSize: 14, color: 'rgba(255,255,255,0.5)' }}>{row.avancoTotal.toLocaleString('pt-PT', { maximumFractionDigits: 0 })}</td>
                                            <td style={{ padding: '10px 16px', textAlign: 'right', fontSize: 15, fontWeight: 700, color: 'white' }}>{row.aderencia.toFixed(1)}%</td>
                                            <td style={{ padding: '10px 16px', textAlign: 'right', fontSize: 15, fontWeight: 700, color: 'white' }}>{row.assiduidade.toFixed(1)}%</td>
                                            <td style={{ padding: '10px 16px', textAlign: 'right' }}>
                                                <span style={{ display: 'inline-block', padding: '4px 12px', borderRadius: 9, fontSize: 17, fontWeight: 900, fontFamily: "'Barlow Condensed', sans-serif", background: scoreBg, color: scoreCor }}>{row.score.toFixed(1)}%</span>
                                            </td>
                                        </tr>
                                    );
                                })}
                                {aggregatedData.length === 0 && <tr><td colSpan={7} style={{ padding: 40, textAlign: 'center', color: 'rgba(255,255,255,0.2)', fontSize: 16 }}>Nenhum dado disponível.</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        );
    }

    // ============================================================================
    // APP PRINCIPAL
    // ============================================================================
    function App() {
        const [screen, setScreen]               = useState('grid');
        const [initialIdx, setInitialIdx]       = useState(0);
        const [loading, setLoading]             = useState(true);
        const [error, setError]                 = useState('');
        const [encarregados, setEncarregados]   = useState([]);
        const [curvas, setCurvas]               = useState([]);
        const [suprimentos, setSuprimentos]     = useState([]);

        // Match fuzzy: verifica se nomeObra está contido em nomeSupr ou vice-versa
        const matchObra = (nomeObra, nomeSupr) => {
            if (!nomeObra || !nomeSupr) return false;
            const a = nomeObra.trim().toLowerCase();
            const b = nomeSupr.trim().toLowerCase();
            return a === b || b.includes(a) || a.includes(b);
        };

        // Lista combinada de obras
        const obras = useMemo(() => {
            const map = {};
            curvas.forEach(c => { if (!map[c.nome]) map[c.nome] = { nome: c.nome, curva: null, encarregados: null, suprimentos: [] }; map[c.nome].curva = c; });
            encarregados.forEach(e => { if (!map[e.nome]) map[e.nome] = { nome: e.nome, curva: null, encarregados: null, suprimentos: [] }; map[e.nome].encarregados = e; });
            // GS já agrupa suprimentos por obra: [{nome, itens}]
            // Faz match fuzzy entre nome da obra no dashboard e nome enviado pelo GS
            suprimentos.forEach(grupo => {
                const nomeGS = grupo.nome || '';
                Object.keys(map).forEach(nomeObra => {
                    if (matchObra(nomeObra, nomeGS)) {
                        (grupo.itens || []).forEach(it => map[nomeObra].suprimentos.push(it));
                    }
                });
            });
            return Object.values(map).sort((a, b) => a.nome.localeCompare(b.nome));
        }, [curvas, encarregados, suprimentos]);

        const loadData = async () => {
            try {
                const res  = await fetch(WEB_APP_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const json = await res.json();
                if (Array.isArray(json)) {
                    setEncarregados(json);
                } else {
                    if (json.encarregados) setEncarregados(json.encarregados);
                    if (json.curvas)       setCurvas(json.curvas);
                    if (json.suprimentos)  setSuprimentos(json.suprimentos);
                }
            } catch (err) {
                setError(err.message);
            } finally {
                setLoading(false);
            }
        };

        useEffect(() => {
            loadData();
            const t = setInterval(loadData, 5 * 60 * 1000);
            const fs = () => { document.documentElement.requestFullscreen?.().catch(() => {}); document.removeEventListener('click', fs); };
            document.addEventListener('click', fs);
            return () => { clearInterval(t); document.removeEventListener('click', fs); };
        }, []);

        if (loading) return (
            <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: '#080c14', color: 'rgba(255,255,255,0.3)' }}>
                <div style={{ width: 40, height: 40, border: '3px solid rgba(59,130,246,0.3)', borderTopColor: '#3b82f6', borderRadius: '50%', animation: 'spin 0.8s linear infinite', marginBottom: 16 }} />
                <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 18, letterSpacing: '0.1em' }}>A ligar à base de dados...</div>
            </div>
        );

        return (
            <>
                {error && (
                    <div style={{ position: 'fixed', top: 16, left: '50%', transform: 'translateX(-50%)', zIndex: 100, padding: '12px 20px', background: 'rgba(127,29,29,0.95)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 14, display: 'flex', alignItems: 'center', gap: 10, fontSize: 13, color: '#fca5a5' }}>
                        <IconAlert size={18} /> {error}
                    </div>
                )}

                {screen === 'grid' && (
                    <div className="screen-enter">
                        <ObrasGridScreen 
                            obras={obras} 
                            onSelectObra={(idx) => { 
                                setInitialIdx(idx); 
                                setScreen('viewer'); 
                            }}
                            onOpenRanking={() => {
                                setInitialIdx(obras.length);
                                setScreen('viewer');
                            }}
                        />
                    </div>
                )}

                {screen === 'viewer' && (
                    <div className="screen-enter" style={{ height: '100vh' }}>
                        <DashboardViewer 
                            obras={obras} 
                            initialIdx={initialIdx}
                            onHome={() => setScreen('grid')} 
                        />
                    </div>
                )}
            </>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
